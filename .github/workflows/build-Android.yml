name: Android 单独构建
on: workflow_dispatch

jobs:
  build-android:
    runs-on: ubuntu-latest
    name: 构建安卓（已签名）
    steps:
      - name: 拉取代码仓库
        uses: actions/checkout@v4

      - name: 读取版本号
        id: get_version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          VERSION=$(echo "$VERSION" | cut -d'+' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 配置 Flutter 环境
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable

      - name: 安装 Java 环境
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: 配置 Android SDK
        uses: android-actions/setup-android@v3

      # 👇 签名文件直接放项目根目录
      - name: 生成签名文件
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > my_key.jks

      # 👇 key.properties 放在 android/ 目录，路径写对
      - name: 创建签名配置
        run: |
          echo "storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=../my_key.jks" >> android/key.properties

      # 👇 关键：强制修改 build.gradle，让它从 key.properties 读配置
      - name: 修改 build.gradle 签名配置
        run: |
          cat > android/app/build.gradle << 'EOF'
def keystorePropertiesFile = rootProject.file("key.properties")
def keystoreProperties = new Properties()
keystoreProperties.load(new FileInputStream(keystorePropertiesFile))

android {
    namespace "com.example.selene"
    compileSdk 34

    defaultConfig {
        applicationId "com.example.selene"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile file(keystoreProperties['storeFile'])
            storePassword keystoreProperties['storePassword']
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
        }
    }
}
EOF

      - name: 构建打包
        run: |
          flutter pub get
          flutter build apk --release --split-per-abi
          flutter build apk --release
          mkdir -p dist
          cp build/app/outputs/flutter-apk/*.apk dist/

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: 沐瑶影视-${{ steps.get_version.outputs.version }}
          path: dist/*.apk
