name: 梦瑶影视 2.0全平台（官方同款）

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  build-windows:
    runs-on: windows-latest
    name: Build Windows
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: get_version
        shell: pwsh
        run: |
          $line = Get-Content pubspec.yaml | Select-String '^version:'
          if ($line) {
            $version = $line.Line -replace 'version: ', ''
            $version = $version.Trim()
          } else {
            $version = "1.0.0"
          }
          $version = $version -split '\+' | Select-Object -First 1
          echo "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable

      - name: Build Windows
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.version }}"
          flutter pub get
          mkdir dist -Force
          flutter build windows --release
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath "dist/selene-$version-windows-x64-portable.zip" -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: dist/*

  build-android:
    runs-on: ubuntu-latest
    name: Build Android
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          if [ -z "$VERSION" ]; then VERSION="1.0.0"; fi
          VERSION=$(echo "$VERSION" | cut -d'+' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable

      - name: Install Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21

      - name: Build Android
        run: |
          flutter pub get
          flutter build apk --release
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk dist/selene-${{ steps.get_version.outputs.version }}-android.apk

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: dist/*

  build-macos-ios:
    runs-on: macos-latest
    name: Build macOS iOS
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          if [ -z "$VERSION" ]; then VERSION="1.0.0"; fi
          VERSION=$(echo "$VERSION" | cut -d'+' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable

      - name: Build Apple
        continue-on-error: true
        run: |
          flutter pub get
          flutter build macos --release
          flutter build ios --release --no-codesign

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: macos-ios-release
          path: build/
