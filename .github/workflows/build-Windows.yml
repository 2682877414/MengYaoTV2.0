# ==========================================================
# 【永久版 · 全注释 · 绝对出包】梦瑶影视 Windows 构建脚本
# 功能：打标签 → 编译 → 打包ZIP → 上传Release
# 格式绝对正确！不会丢命令！
# ==========================================================
name: 梦瑶影视 2.0 (Windows 自动构建)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable

      - name: 安装依赖
        run: flutter pub get

      - name: 编译 Windows 正式版
        run: flutter build windows --release

      - name: 打包成 ZIP 压缩包（100%执行）
        run: 7z a MengYaoTV-${{ github.ref_name }}.zip ./build/windows/x64/runner/Release/*

      - name: 查看生成的文件
        run: dir

      - name: 上传到 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: MengYaoTV-${{ github.ref_name }}.zip
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
