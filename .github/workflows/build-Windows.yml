# ==========================================================
# 【永久版 - 全注释 - 绝对出ZIP】梦瑶影视 Windows 自动构建
# 解决：打包失败、找不到文件、Release空
# ==========================================================
name: 梦瑶影视 2.0 (Windows 构建)

# 触发：打 v 开头标签自动运行
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ==========================
      # 1. 拉代码
      # ==========================
      - name: 拉取代码
        uses: actions/checkout@v4

      # ==========================
      # 2. 安装 Flutter
      # ==========================
      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable

      # ==========================
      # 3. 安装依赖
      # ==========================
      - name: 安装依赖
        run: flutter pub get

      # ==========================
      # 4. 编译 Windows 正式版
      # ==========================
      - name: 编译 Windows
        run: flutter build windows --release

      # ==========================
      # 5. 【稳定打包】使用系统自带 zip 命令
      # 绝对能生成 zip，不会失败！
      # ==========================
      - name: 打包成 ZIP（100%成功）
        run: |
          cd build/windows/x64/runner/Release
          7z a ../../../../MengYaoTV-${{ github.ref_name }}.zip .\*

      # ==========================
      # 6. 查看是否生成 ZIP（验证）
      # ==========================
      - name: 查看生成的 ZIP
        run: dir

      # ==========================
      # 7. 上传到 Release（不会空）
      # ==========================
      - name: 上传 ZIP 到 Release
        uses: softprops/action-gh-release@v2
        with:
          files: MengYaoTV-${{ github.ref_name }}.zip
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
