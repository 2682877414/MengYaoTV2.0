# ==========================================
# 梦瑶影视2.0 (iOS自动构建 · 未签名包)
# 作用：打标签自动构建 iOS · 自动上传 Releases
# 输出文件名：梦瑶影视2.0-iOS-v2.0.0-未签名.ipa
# ==========================================
name: 梦瑶影视2.0 (iOS自动构建)

# 触发条件
# 1. 打 v* 标签（如 v2.0.0）自动构建
# 2. 支持手动触发构建
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest  # iOS 必须用 macOS 环境
    steps:
      # 1. 拉取项目代码
      - name: 拉取代码
        uses: actions/checkout@v4

      # 2. 安装 Flutter 3.41.7
      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.7

      # 3. 读取标签版本号（例如 v2.0.0）
      # 直接用 GitHub 标签名，保证文件名统一带 v
      - name: 读取标签版本号
        run: |
          TAG_NAME=${{ github.ref_name }}
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV

      # 4. 安装项目依赖
      - name: 安装依赖
        run: flutter pub get

      # 5. 构建 iOS 正式包（不签名）
      - name: 构建未签名 iOS 包
        run: flutter build ios --release --no-codesign

      # 6. 查看包架构信息（调试用，可忽略）
      - name: 查看架构
        run: lipo -info build/ios/iphoneos/Runner.app/Runner

      # 7. 打包成 IPA 文件
      # 文件名格式：梦瑶影视2.0-iOS-v2.0.0-未签名.ipa
      - name: 打包 IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r "梦瑶影视2.0-iOS-${{ env.TAG_NAME }}-未签名.ipa" Payload/

      # 8. 上传 IPA 到 GitHub Releases
      - name: 上传到 Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            梦瑶影视2.0-iOS-${{ env.TAG_NAME }}-未签名.ipa
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
