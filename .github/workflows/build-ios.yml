# ==========================================
# 梦瑶影视 iOS 自动构建（未签名包）
# 无需证书 → 构建后自己签名安装
# ==========================================
name: 梦瑶影视2.0 (iOS自动构建)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.7

      - name: 读取版本号
        run: |
          VERSION=$(cat pubspec.yaml | grep "^version:" | awk '{print $2}' | cut -d'+' -f1)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: 安装依赖
        run: flutter pub get

      - name: 构建未签名 iOS 包
        run: flutter build ios --release --no-codesign

      - name: 查看架构
        run: lipo -info build/ios/iphoneos/Runner.app/Runner

      - name: 打包 IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r "梦瑶影视-${{ env.VERSION }}-iOS-未签名.ipa" Payload/

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: 梦瑶影视-${{ env.VERSION }}-iOS-未签名
          path: "梦瑶影视-${{ env.VERSION }}-iOS-未签名.ipa"
