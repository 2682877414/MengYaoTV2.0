# ==========================================
# 梦瑶影视 iOS 自动构建（未签名包）
# 无需证书 → 构建后自己签名安装
# 自动上传到 Releases
# ==========================================
name: 梦瑶影视2.0 (iOS自动构建)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.7

      - name: 读取版本号
        run: |
          VERSION=$(cat pubspec.yaml | grep "^version:" | awk '{print $2}' | cut -d'+' -f1)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: 安装依赖
        run: flutter pub get

      - name: 构建未签名 iOS 包
        run: flutter build ios --release --no-codesign

      - name: 查看架构
        run: lipo -info build/ios/iphoneos/Runner.app/Runner

      - name: 打包 IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r "梦瑶影视2.0-iOS-${{ env.VERSION }}-未签名.ipa" Payload/

      # ==========================================
      # 🔥 这里是我帮你加上传 Release 的步骤
      # ==========================================
      - name: 上传到 Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            梦瑶影视2.0-iOS-${{ env.VERSION }}-未签名.ipa
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
